services:
  game-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml_service:8001}
      BLOCKCHAIN_SERVICE_URL: ${BLOCKCHAIN_SERVICE_URL:-http://blockchain:8002}
      SERVICE_CONNECT_TIMEOUT: ${SERVICE_CONNECT_TIMEOUT:-2}
      SERVICE_READ_TIMEOUT: ${SERVICE_READ_TIMEOUT:-5}
      ROOM_EXPIRY_SECONDS: ${ROOM_EXPIRY_SECONDS:-25}
      GAME_TIME_LIMIT_SECONDS: ${GAME_TIME_LIMIT_SECONDS:-600}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_ROOM_TTL_SECONDS: ${REDIS_ROOM_TTL_SECONDS:-3600}
      SCHEDULER_POLL_INTERVAL: ${SCHEDULER_POLL_INTERVAL:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      ALLOW_DEGRADED_CREATION: ${ALLOW_DEGRADED_CREATION:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      ml_service:
        condition: service_healthy
      blockchain:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  ml_service:
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app_network

  blockchain:
    build: ./blockchain
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - app_network

  mariadb:
    image: mariadb:10.6
    container_name: matomo-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MATOMO_DB_NAME:-matomo}
      MYSQL_USER: ${MATOMO_DB_USER:-matomo}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD:-matomo_password}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  matomo:
    image: matomo:latest
    container_name: matomo
    restart: always
    depends_on:
      - mariadb
    ports:
      - "8081:80"
    environment:
      MATOMO_DATABASE_HOST: mariadb
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER:-matomo}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD:-matomo_password}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DB_NAME:-matomo}
    volumes:
      - matomo_data:/var/www/html
    networks:
      - app_network

volumes:
  db_data:
  matomo_data:
  redis_data:

networks:
  app_network:
